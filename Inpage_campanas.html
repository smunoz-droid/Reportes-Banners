<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FDV Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--dark:#1f2322;--beige:#F5F5F2;--orange:#ff5c02;--border:#e0ddd5;--muted:#6a6560;--bg:#edeae3;}
body{font-family:'Bai Jamjuree',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
.sidebar{background:var(--dark);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;}
.sb-logo{padding:1.4rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.07);}
.sb-logo span{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:0.25em;display:block;margin-bottom:2px;}
.sb-logo strong{font-size:16px;color:#fff;}
.nav{flex:1;padding:0.5rem 0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:0.65rem 1.2rem;cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;}
.nav-item:hover{background:rgba(255,255,255,0.04);}
.nav-item.active{background:rgba(255,92,2,0.1);border-left-color:var(--orange);}
.nav-num{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#9a9590;flex-shrink:0;}
.nav-item.active .nav-num{background:var(--orange);color:#fff;}
.nav-lbl{font-size:11px;font-weight:600;color:#9a9590;text-transform:uppercase;letter-spacing:0.1em;}
.nav-item.active .nav-lbl{color:#fff;}
.sb-footer{padding:1.2rem;border-top:1px solid rgba(255,255,255,0.07);}
.btn-gen{width:100%;padding:11px;background:var(--orange);border:none;border-radius:8px;font-family:'Bai Jamjuree',sans-serif;font-size:12px;font-weight:700;color:#fff;cursor:pointer;text-transform:uppercase;letter-spacing:0.12em;}
.main{padding:2.5rem 2.8rem;overflow-y:auto;}
.panel{display:none;}
.panel.active{display:block;}
.panel-hd{margin-bottom:2rem;padding-bottom:1rem;border-bottom:2px solid var(--border);}
.panel-hd h2{font-size:20px;font-weight:700;margin-bottom:3px;}
.panel-hd p{font-size:12px;color:var(--muted);}
.fg{margin-bottom:1.2rem;}
.fg label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);margin-bottom:5px;}
.fg input,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Bai Jamjuree',sans-serif;font-size:13px;color:var(--dark);background:#fff;outline:none;transition:border-color 0.15s;}
.fg input:focus,.fg textarea:focus{border-color:var(--orange);}
.fg textarea{resize:vertical;min-height:68px;line-height:1.5;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;}
.sub{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.2em;color:var(--orange);margin:1.8rem 0 1rem;display:flex;align-items:center;gap:8px;}
.sub::after{content:'';flex:1;height:1px;background:rgba(255,92,2,0.25);}
.card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:0.8rem;}
.card-hd{font-size:11px;font-weight:700;color:var(--dark);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.card-num{width:22px;height:22px;border-radius:50%;background:var(--dark);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.hs-wrap{position:relative;display:block;max-width:420px;margin-bottom:1.5rem;cursor:crosshair;}
.hs-wrap img{width:100%;border-radius:12px;display:block;min-height:60px;background:#eee;user-select:none;}
.hs-dot{position:absolute;transform:translate(-50%,-50%);width:28px;height:28px;background:#ff5c02;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.35);pointer-events:none;transition:transform 0.15s,background 0.15s;}
.hs-dot.placing{background:#1f2322;transform:translate(-50%,-50%) scale(1.2);}
.hs-selector{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.hs-sel-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:'Bai Jamjuree',sans-serif;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;transition:all 0.15s;}
.hs-sel-btn.active{background:var(--orange);border-color:var(--orange);color:#fff;}
.hs-instruction{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:8px;min-height:16px;}
.db-bar-card{background:#fff;border-radius:12px;padding:1rem 1.4rem;border:1.5px solid var(--border);}
.db-bar-row{display:flex;align-items:center;gap:12px;margin-top:6px;}
.db-track{flex:1;position:relative;height:6px;background:#e8e5de;border-radius:3px;}
.db-fill{position:absolute;left:0;top:0;height:100%;background:var(--orange);border-radius:3px;transition:width 0.15s;}
.db-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;background:var(--dark);border-radius:50%;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,0.3);transition:left 0.15s;}
.cmp-prod.featured .out-wrap{margin-top:2rem;background:#fff;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;}
.out-tb{display:flex;align-items:center;justify-content:space-between;padding:0.8rem 1.2rem;background:var(--dark);}
.out-tb span{font-size:11px;font-weight:700;color:#9a9590;text-transform:uppercase;letter-spacing:0.15em;}
.btn-copy{padding:7px 16px;background:var(--orange);border:none;border-radius:6px;font-family:'Bai Jamjuree',sans-serif;font-size:11px;font-weight:700;color:#fff;cursor:pointer;}
#out-code{width:100%;min-height:300px;padding:1.2rem;font-family:monospace;font-size:11px;line-height:1.5;border:none;outline:none;resize:vertical;background:#fafaf8;}
.hint{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;}
.btn-ref{padding:8px 16px;background:var(--dark);border:none;border-radius:8px;font-family:'Bai Jamjuree',sans-serif;font-size:11px;font-weight:700;color:#fff;cursor:pointer;margin-bottom:1rem;}

.img-prev-wrap{margin-top:6px;min-height:30px;}
.img-prev-wrap img{max-width:100%;max-height:160px;border-radius:8px;display:block;object-fit:contain;background:#f0ede6;transition:opacity 0.2s;}

</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sb-logo"><span>Inpage Builder</span><strong>FDV Campanas</strong></div>
  <div style="padding:0.8rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.07);"><label style="font-size:9px;font-weight:700;color:#6a6560;text-transform:uppercase;letter-spacing:0.2em;display:block;margin-bottom:5px;">Producto</label><input id="prod-name" type="text" placeholder="ej. Campana Urban 60" style="width:100%;padding:7px 10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:7px;font-family:'Bai Jamjuree',sans-serif;font-size:12px;color:#fff;outline:none;" oninput="saveLs()"></div><nav class="nav" id="nav"></nav>
  <div class="sb-footer"><button class="btn-gen" onclick="generateCode()">&#9889; Generar codigo</button><button class="btn-gen" onclick="showPreview()" style="margin-top:8px;background:#2e3a38;">&#128065; Preview</button><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;"><button class="btn-gen" onclick="exportJson()" style="background:#2e3a38;font-size:10px;">&#8595; Export</button><label class="btn-gen" style="background:#2e3a38;font-size:10px;cursor:pointer;text-align:center;">&#8593; Import<input type="file" accept=".json" onchange="importJson(event)" style="display:none;"></label></div><button class="btn-gen" onclick="resetAll()" style="margin-top:8px;background:#5c2a1e;font-size:10px;">&#8635; Resetear</button></div>
</aside>
<main class="main" id="main"></main>
</div>
<script>
var SEC=[
  {id:'hero',lbl:'Hero'},
  {id:'stats',lbl:'Stats'},
  {id:'hotspots',lbl:'Hotspots'},
  {id:'ext',lbl:'Extraccion'},
  {id:'sil',lbl:'Silencio'},
  {id:'compat',lbl:'Compatibilidad'},
  {id:'faq',lbl:'FAQ'},
  {id:'med',lbl:'Medidas'},
    {id:'cierre',lbl:'Cierre'}
];


var D={
  hero:{img:'https://cdn.shopify.com/s/files/1/0104/4391/5319/files/Diseno_sin_titulo_22.webp?v=1773749337',alt:'Campana Urban FDV',t1:'Compacta y',t2:'silenciosa',desc:'Es ideal para espacios pequeños y funcionales.'},
  stats:{n1:'350 m3/h',l1:'Aspiracion',n2:'2 Filtros',l2:'Accesorios',n3:'2 Velocidades',l3:'Control'},
  hs:{img:'https://cdn.shopify.com/s/files/1/0104/4391/5319/files/f6d7de_4.png?v=1773750760',alt:'Campana Urban FDV',
    t1:'Recirculacion y Salida Exterior',d1:'Esta campana ofrece dos opciones de instalacion.',top1:'22',lft1:'52',
    t2:'Materiales',d2:'Cuerpo fabricado en acero inoxidable de alta resistencia con acabado satinado.',top2:'48',lft2:'14',
    t3:'Control Analogo',d3:'Mando mecanico analogico de facil uso. Permite seleccionar entre las 2 velocidades.',top3:'82',lft3:'28',
    t4:'Filtros',d4:'Filtros de aluminio multicapa desmontables y aptos para lavavajillas.',top4:'52',lft4:'72'},
  ext:{img:'https://www.kitchencenter.cl/cdn/shop/products/campana-urban-60-fdv.jpg?v=1747318991&width=823',alt:'Campana Urban FDV',
    t1:'Capacidad de',t2:'extraccion',sub:'lo ideal segun tu cocina',num:'350 m3/h',
    desc:'Potencia suficiente para cocinas integradas y espacios de diseno compacto.',
    feq:'Largo x Ancho x Alto x 10',ftip:'Una cocina de 3x2.5x2.4 m necesita 180 m3/h — esta campana la cubre con holgura.'},
  sil:{t1:'Campana Silenciosa',t2:' para una Cocina Tranquila',db:'60 dB(A)',dbdesc:'Similar al ruido de una conversacion normal',pct:'18',
    txt:'Esta campana es perfecta para mantener un ambiente silencioso mientras cocinas.'},
  compat:{t1:'Compatible con tu',t2:'cocina',sub:'Dos modos de instalacion para adaptarse a cualquier espacio',
    rt:'Modo Recirculacion',rd:'El aire pasa por los filtros metalicos, se purifica y vuelve limpio al ambiente.',
    rav:'Este modo requiere filtros de carbon activo adicionales. Se adquieren por separado.',rimg:'https://cdn.shopify.com/s/files/1/0104/4391/5319/files/f6d7de_6.png?v=1773854767',
    st:'Modo Salida Exterior',sd:'Los olores y vapores se expulsan completamente fuera de la cocina a traves de un ducto.',
    ireci:'https://cdn.shopify.com/s/files/1/0104/4391/5319/files/Recirculacion.png?v=1773754476',
    isal:'https://cdn.shopify.com/s/files/1/0104/4391/5319/files/ventilacion.png?v=1773754477',
    ifuego:'https://cdn.shopify.com/s/files/1/0104/4391/5319/files/fuego.png?v=1773754477',
    ilavado:'https://cdn.shopify.com/s/files/1/0104/4391/5319/files/lavado.png?v=1773754477',
    e1t:'Todo Tipo de Encimera',e1d:'Compatible con encimeras a gas, electricas, vitroceramicas e induccion.',
    e2t:'Filtros Metalicos Lavables',e2d:'Filtros de aluminio multicapa desmontables y aptos para lavavajillas.'},
  faq:{ey:'Campana Urban FDV',
    q1:'Como se instala la campana?',a1:'La Campana Urban 60 se instala bajo el mueble mediante tornillos incluidos en el kit.',
    q2:'Que diferencia hay entre recirculacion y salida exterior?',a2:'En recirculacion el aire vuelve limpio al ambiente. En salida exterior se expulsa completamente.',
    q3:'Con que frecuencia hay que limpiar los filtros?',a3:'Se recomienda limpiar los filtros de aluminio cada 2-3 meses. Son aptos para lavavajillas.',
    q4:'Es compatible con mi encimera?',a4:'Si, compatible con gas, electrica, vitroceramica e induccion. Distancia minima 65 cm para gas.',
    q5:'Que incluye en la caja?',a5:'Kit de montaje, 2 filtros de aluminio instalados, adaptador ducto 120mm y manual.'},
  med:{img:'https://cdn.shopify.com/s/files/1/0104/4391/5319/files/0ef0678a5c1a811637b45a928e21d8f8e93531a6.png?v=1773750237',ancho:'600',fondo:'302',alto:'43'},
  cierre:{lbl:'Campana Urban FDV',t1:'La cocina que mereces,',t2:'en silencio.',txt:'Compacta, silenciosa y potente.',p1:'350 m3/h',p2:'60 dB(A)',p3:'2 Velocidades'}
};

function e(s){return String(s||'').replace(/"/g,'&quot;');}
function g(id){var el=document.getElementById(id);return el?el.value:'';}

function inp(id,lbl,val,hint){
  val=val||'';hint=hint||'';
  return '<div class="fg"><label>'+lbl+'</label><input type="text" id="'+id+'" value="'+e(val)+'" oninput="sy(\''+id+'\')">'+(hint?'<p class="hint">'+hint+'</p>':'')+'</div>';
}
function imgprev(id,val,sz){
  sz=sz||'100%';
  return '<div class="img-prev-wrap"><img id="prev_'+id+'" src="'+e(val||'')+'" style="max-width:'+sz+';" onerror="this.style.opacity=0.15" onload="this.style.opacity=1"></div>';
}
function inpImg(id,lbl,val,sz){
  val=val||'';
  return '<div class="fg"><label>'+lbl+'</label><input type="text" id="'+id+'" value="'+e(val)+'" oninput="sy(this.id);updPrev(this.id)">'+imgprev(id,val,sz)+'</div>';
}
function ta(id,lbl,val){
  val=val||'';
  return '<div class="fg"><label>'+lbl+'</label><textarea id="'+id+'" oninput="sy(\''+id+'\')">'+val+'</textarea></div>';
}
function r2(a,b){return '<div class="r2">'+a+b+'</div>';}
function r3(a,b,c){return '<div class="r3">'+a+b+c+'</div>';}

function pnl(id,title,desc,body){
  return '<div id="pnl-'+id+'" class="panel'+(id==='hero'?' active':'')+'">'+
    '<div class="panel-hd"><h2>'+title+'</h2><p>'+desc+'</p></div>'+body+'</div>';
}

function buildHero(){
  var d=D.hero;
  return pnl('hero','1 · Hero','Imagen principal y texto',
    '<div class="sub">Imagen</div>'+inpImg('hero_img','URL imagen',d.img)+inp('hero_alt','Alt text',d.alt)+
    '<div class="sub">Texto</div>'+r2(inp('hero_t1','Titulo normal',d.t1),inp('hero_t2','Titulo italica',d.t2))+ta('hero_desc','Descripcion',d.desc));
}

function buildStats(){
  var d=D.stats;
  return pnl('stats','2 · Stats','Barra oscura con 3 estadisticas',
    '<div class="sub">Stat 1</div>'+r2(inp('stats_n1','Valor',d.n1),inp('stats_l1','Etiqueta',d.l1))+
    '<div class="sub">Stat 2</div>'+r2(inp('stats_n2','Valor',d.n2),inp('stats_l2','Etiqueta',d.l2))+
    '<div class="sub">Stat 3</div>'+r2(inp('stats_n3','Valor',d.n3),inp('stats_l3','Etiqueta',d.l3)));
}

function buildHotspots(){
  var d=D.hs;
  var dots='';
  for(var i=1;i<=4;i++){
    dots+='<div class="hs-dot" id="hsd'+i+'" style="top:'+d['top'+i]+'%;left:'+d['lft'+i]+'%;">'+i+'</div>';
  }
  var selBtns='';
  for(var i=1;i<=4;i++){
    selBtns+='<button class="hs-sel-btn'+(i===1?' active':'')+'" id="hsbtn'+i+'" onclick="selectDot('+i+')">Punto '+i+'</button>';
  }
  var cards='';
  for(var j=1;j<=4;j++){
    cards+='<div class="sub">Punto '+j+'</div><div class="card">'+
      '<div class="card-hd"><span class="card-num">'+j+'</span> Hotspot '+j+'</div>'+
      r2(inp('hs_t'+j,'Titulo',d['t'+j]),'<div class="fg"><label>Descripcion</label><textarea id="hs_d'+j+'" oninput="sy(this.id)" style="min-height:100px;">'+e(d['d'+j]||'')+'</textarea></div>')+
      '<div class="r2">'+
        '<div class="fg"><label>Top %</label><input type="number" id="hs_top'+j+'" min="0" max="100" value="'+e(d['top'+j]||'50')+'" oninput="sy(this.id);mvDot('+j+')"></div>'+
        '<div class="fg"><label>Left %</label><input type="number" id="hs_lft'+j+'" min="0" max="100" value="'+e(d['lft'+j]||'50')+'" oninput="sy(this.id);mvDot('+j+')"></div>'+
      '</div>'+
    '</div>';
  }
  return pnl('hotspots','3 · Hotspots','Imagen con 4 puntos interactivos',
    '<div class="sub">Imagen</div>'+
    inpImg('hs_img','URL imagen',d.img)+inp('hs_alt','Alt text',d.alt)+
    '<button class="btn-ref" onclick="refreshHs()">Actualizar imagen</button>'+
    '<div class="sub">Posicion de puntos</div>'+
    '<p class="hs-instruction" id="hs-instr">Selecciona un punto y haz clic sobre la imagen</p>'+
    '<div class="hs-selector">'+selBtns+'</div>'+
    '<div class="hs-wrap" id="hs-wrap" onclick="hsClick(event)"><img id="hs-img" src="'+e(d.img)+'" alt="" draggable="false">'+dots+'</div>'+
    cards);
}

function buildExt(){
  var d=D.ext;
  return pnl('ext','4 · Extraccion','Seccion oscura con capacidad de extraccion',
    '<div class="sub">Imagen</div>'+r2(inpImg('ext_img','URL imagen',d.img),inp('ext_alt','Alt text',d.alt))+
    '<div class="sub">Textos</div>'+r2(inp('ext_t1','Titulo normal',d.t1),inp('ext_t2','Titulo negrita',d.t2))+
    inp('ext_sub','Subtitulo',d.sub)+inp('ext_num','Numero grande',d.num)+ta('ext_desc','Descripcion',d.desc)+
    '<div class="sub">Formula</div>'+inp('ext_feq','Ecuacion',d.feq)+ta('ext_ftip','Tip',d.ftip));
}

function buildSil(){
  var d=D.sil;
  var pct=d.pct||'18';
  return pnl('sil','5 · Silencio','Nivel de ruido y barra visual',
    '<div class="sub">Textos</div>'+
    r2(inp('sil_t1','Titulo italica',d.t1),inp('sil_t2','Sufijo normal',d.t2))+
    r2(inp('sil_db','Valor dB',d.db),inp('sil_dbdesc','Descripcion bajo valor',d.dbdesc))+
    ta('sil_txt','Parrafo',d.txt)+
    '<div class="sub">Barra de nivel</div>'+
    '<div class="r2">'+
      inp('sil_pct','Posicion % (0=silencioso 100=ruidoso)',pct)+
      '<div><label style="display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);margin-bottom:8px;">Preview</label>'+
      '<div class="db-bar-card"><div class="db-bar-row">'+
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/></svg>'+
        '<div class="db-track"><div class="db-fill" id="dbfill" style="width:'+pct+'%;"></div><div class="db-dot" id="dbdot" style="left:'+pct+'%;"></div></div>'+
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>'+
      '</div></div></div>'+
    '</div>');
}

function buildCompat(){
  var d=D.compat;
  return pnl('compat','6 · Compatibilidad','Toggle recirculacion / salida exterior',
    '<div class="sub">Encabezado</div>'+r2(inp('co_t1','Titulo normal',d.t1),inp('co_t2','Titulo italica',d.t2))+inp('co_sub','Subtitulo',d.sub)+
    '<div class="sub">Iconos</div>'+r2(inp('co_ireci','URL icono recirculacion',d.ireci),inp('co_isal','URL icono salida exterior',d.isal))+
    r2(inp('co_ifuego','URL icono fuego/encimera',d.ifuego),inp('co_ilavado','URL icono lavado',d.ilavado))+
    '<div class="sub">Modo recirculacion</div>'+inp('co_rt','Titulo',d.rt)+ta('co_rd','Descripcion',d.rd)+inpImg('co_rimg','URL imagen diagrama',d.rimg)+ta('co_rav','Aviso',d.rav)+
    '<div class="sub">Modo salida exterior</div>'+inp('co_st','Titulo',d.st)+ta('co_sd','Descripcion',d.sd)+
    '<div class="sub">Cards extras</div>'+r2(inp('co_e1t','Card 1 titulo',d.e1t),inp('co_e1d','Card 1 desc',d.e1d))+r2(inp('co_e2t','Card 2 titulo',d.e2t),inp('co_e2d','Card 2 desc',d.e2d)));
}

function buildFaq(){
  var d=D.faq;
  var cards='';
  for(var i=1;i<=5;i++){
    cards+='<div class="card"><div class="card-hd"><span class="card-num">'+i+'</span> Pregunta '+i+'</div>'+
      inp('faq_q'+i,'Pregunta',d['q'+i])+ta('faq_a'+i,'Respuesta',d['a'+i])+'</div>';
  }
  return pnl('faq','7 · FAQ','Preguntas frecuentes',inp('faq_ey','Eyebrow',d.ey)+cards);
}

function buildMed(){
  var d=D.med;
  var show=d.showEncastre!==false;
  return pnl('med','8 · Medidas','Diagrama y grilla de medidas',

function sy(id){saveLs();
  var el=document.getElementById(id);
  if(!el) return;
  var v=el.value;
  if(id.startsWith('hero_'))D.hero[id.slice(5)]=v;
  else if(id.startsWith('stats_'))D.stats[id.slice(6)]=v;
  else if(id.startsWith('hs_')){
    var k=id.slice(3);D.hs[k]=v;
    var m=id.match(/hs_(top|lft)(\d)/);
    if(m) mvDot(parseInt(m[2]));
  }
  else if(id.startsWith('ext_'))D.ext[id.slice(4)]=v;
  else if(id.startsWith('sil_')){D.sil[id.slice(4)]=v;if(id==='sil_pct')updBar();}
  else if(id.startsWith('co_'))D.compat[id.slice(3)]=v;
  else if(id.startsWith('faq_'))D.faq[id.slice(4)]=v;
  else if(id.startsWith('med_'))D.med[id.slice(4)]=v;
  else if(id.startsWith('ci_'))D.cierre[id.slice(3)]=v;
}

var _hsSel=1;

function selectDot(i){
  _hsSel=i;
  document.querySelectorAll('.hs-sel-btn').forEach(function(b,idx){b.classList.toggle('active',idx+1===i);});
  document.querySelectorAll('.hs-dot').forEach(function(d,idx){d.classList.toggle('placing',idx+1===i);});
  var instr=document.getElementById('hs-instr');
  if(instr) instr.textContent='Haz clic en la imagen para posicionar el Punto '+i;
}

function hsClick(ev){
  var wrap=document.getElementById('hs-wrap');
  if(!wrap) return;
  var rect=wrap.getBoundingClientRect();
  var x=ev.clientX-rect.left;
  var y=ev.clientY-rect.top;
  var pctX=Math.round(x/rect.width*100);
  var pctY=Math.round(y/rect.height*100);
  pctX=Math.max(0,Math.min(100,pctX));
  pctY=Math.max(0,Math.min(100,pctY));
  var ti=document.getElementById('hs_top'+_hsSel);
  var li=document.getElementById('hs_lft'+_hsSel);
  if(ti){ti.value=pctY;D.hs['top'+_hsSel]=String(pctY);}
  if(li){li.value=pctX;D.hs['lft'+_hsSel]=String(pctX);}
  mvDot(_hsSel);
  // auto-advance to next dot
  var next=_hsSel<4?_hsSel+1:_hsSel;
  selectDot(next);
}

// ── PRODUCT NAME ──
function getProdName(){return (document.getElementById('prod-name')||{}).value||'FDV';}

// ── LOCALSTORAGE ──
function saveLs(){
  try{localStorage.setItem('fdv_builder_data',JSON.stringify(D));
  var pn=document.getElementById('prod-name');
  if(pn) localStorage.setItem('fdv_builder_prod',pn.value);}catch(e){}
}
function loadLs(){
  try{
    var raw=localStorage.getItem('fdv_builder_data');
    if(raw){var saved=JSON.parse(raw);
      Object.keys(saved).forEach(function(k){if(D[k])Object.assign(D[k],saved[k]);});}
    var pn=localStorage.getItem('fdv_builder_prod');
    var el=document.getElementById('prod-name');
    if(pn&&el) el.value=pn;
  }catch(e){}
}

// ── RESET ──
function resetAll(){
  if(!confirm('Resetear todos los campos a vacio?')) return;
  function clearObj(obj){Object.keys(obj).forEach(function(k){
    if(typeof obj[k]==='string') obj[k]='';
    else if(Array.isArray(obj[k])) obj[k].forEach(function(item){if(typeof item==='object') clearObj(item);});
    else if(typeof obj[k]==='object') clearObj(obj[k]);
  });}
  clearObj(D);
  var pn=document.getElementById('prod-name');if(pn) pn.value='';
  localStorage.removeItem('fdv_builder_data');
  localStorage.removeItem('fdv_builder_prod');
  buildAll(); renderNav(); showToast('Reseteado');
}

// ── EXPORT JSON ──
function syncAllFromDom(){
  // pull current values from all inputs into D before export
  document.querySelectorAll('#main input,#main textarea').forEach(function(el){
    if(el.id) sy(el.id);
  });
}

function exportJson(){
  syncAllFromDom();
  var prod=getProdName();
  var snapshot=JSON.parse(JSON.stringify({prod:prod,fields:D}));
  var blob=new Blob([JSON.stringify(snapshot,null,2)],{type:'application/json;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='fdv-'+(prod||'inpage').replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast('Exportado');
}

// ── IMPORT JSON ──
function importJson(ev){
  var file=ev.target.files[0];if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var text=e.target.result;
      var data=JSON.parse(text);
      if(!data.fields) throw new Error('Formato invalido');
      // deep merge into D
      Object.keys(data.fields).forEach(function(k){
        if(D[k] && typeof D[k]==='object'){
          Object.keys(data.fields[k]).forEach(function(kk){
            D[k][kk]=data.fields[k][kk];
          });
        }
      });
      var pn=document.getElementById('prod-name');
      if(data.prod&&pn){pn.value=data.prod;}
      buildAll();renderNav();
      showToast('Importado OK');
    }catch(err){alert('Error al leer JSON: '+err.message);}
    ev.target.value='';
  };
  reader.readAsText(file,'utf-8');
}

    var main=document.getElementById('main');
    var div=document.createElement('div');
    div.id='pnl-preview';div.className='panel';
    div.innerHTML='<div style="margin:-2.5rem -2.8rem 0;height:100vh;display:flex;flex-direction:column;"><div style="padding:1rem 1.5rem;border-bottom:1px solid #e0ddd5;display:flex;align-items:center;justify-content:space-between;"><span style="font-size:13px;font-weight:700;">Preview</span></div><iframe id="preview-frame" style="width:100%;height:calc(100vh - 80px);border:none;border-radius:0;background:#fff;display:block;" sandbox="allow-scripts allow-same-origin"></iframe>';
    main.appendChild(div);pp=div;
  }
  var frame=document.getElementById('preview-frame');
  if(frame){
    frame.srcdoc='';
    setTimeout(function(){frame.srcdoc=full;},50);
  }
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  pp.classList.add('active');
  var pnav=document.getElementById('nav-preview');
  if(!pnav){
    var nav=document.getElementById('nav');
    pnav=document.createElement('div');pnav.id='nav-preview';pnav.className='nav-item';
    pnav.innerHTML='<span class="nav-num">&#128065;</span><span class="nav-lbl">Preview</span>';
    pnav.onclick=function(){showPreview();};
    nav.appendChild(pnav);
  }
  pnav.classList.add('active');
}

// ── TOAST ──
function showToast(msg){
  var t=document.getElementById('fdv-toast');
  if(!t){t=document.createElement('div');t.id='fdv-toast';t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}


renderNav();
buildAll();
loadLs();
</script>
